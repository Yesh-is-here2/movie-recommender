<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Recommender — Login</title>
<style>
  /* Reset default browser margins and padding on all elements */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Full-screen centered layout with dark purple gradient background */
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', sans-serif; color: #fff;
  }

  /* Centered container with max width for the login card */
  .container { width: 100%; max-width: 420px; padding: 20px; }

  /* Logo area at the top — app name and tagline */
  .logo { text-align: center; margin-bottom: 30px; }

  /* Pink gradient text effect for the CineAI logo */
  .logo h1 { font-size: 2rem; background: linear-gradient(90deg, #f953c6, #b91d73); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo p { color: #aaa; font-size: 0.9rem; margin-top: 5px; }

  /* Glass-morphism card effect — frosted glass look */
  .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 32px; }

  /* Tab bar for switching between Login and Register forms */
  .tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #aaa; font-size: 0.95rem; transition: all 0.3s; }

  /* Active tab highlighted in pink with underline */
  .tab.active { color: #f953c6; border-bottom: 2px solid #f953c6; }

  /* Individual form field group — label + input */
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; }

  /* Input fields — semi-transparent dark background */
  input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: #fff; font-size: 0.95rem; outline: none; transition: border 0.3s; }

  /* Pink border glow when input is focused */
  input:focus { border-color: #f953c6; }

  /* Submit button — full width pink gradient */
  .btn { width: 100%; padding: 13px; background: linear-gradient(90deg, #f953c6, #b91d73); border: none; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.3s; margin-top: 8px; }
  .btn:hover { opacity: 0.9; }

  /* Success/error message box shown after login or register attempt */
  .msg { text-align: center; margin-top: 14px; font-size: 0.9rem; padding: 10px; border-radius: 8px; display: none; }
  .msg.error { background: rgba(255,50,50,0.15); color: #ff6b6b; display: block; }
  .msg.success { background: rgba(50,255,100,0.15); color: #6bffaa; display: block; }
</style>
</head>
<body>

<!-- Centered login card -->
<div class="container">

  <!-- App logo and tagline -->
  <div class="logo">
    <h1>🎬 CineAI</h1>
    <p>Your intelligent movie companion</p>
  </div>

  <div class="card">

    <!-- Tab switcher — clicking a tab shows/hides the corresponding form -->
    <div class="tabs">
      <div class="tab active" onclick="showTab('login')">Login</div>
      <div class="tab" onclick="showTab('register')">Register</div>
    </div>

    <!-- LOGIN FORM — shown by default -->
    <div id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="Enter username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password">
      </div>
      <button class="btn" onclick="doLogin()">Login</button>
      <!-- Error/success message shown after login attempt -->
      <div id="loginMsg" class="msg"></div>
    </div>

    <!-- REGISTER FORM — hidden by default, shown when Register tab is clicked -->
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="regUsername" placeholder="Choose a username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="Your email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Choose a password">
      </div>
      <button class="btn" onclick="doRegister()">Create Account</button>
      <!-- Error/success message shown after registration attempt -->
      <div id="regMsg" class="msg"></div>
    </div>

  </div>
</div>

<script>
// Switch between Login and Register tabs
// Shows the selected form and hides the other one
// Also updates the active styling on the tab buttons
function showTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
  });
}

// Handle login form submission
// Sends username and password to the /login endpoint as form data
// On success: shows success message and redirects to dashboard after 800ms
// On failure: shows the error message returned by the server
async function doLogin() {
  const username = document.getElementById('loginUsername').value;
  const password = document.getElementById('loginPassword').value;
  const msg = document.getElementById('loginMsg');

  // Use FormData because the backend expects form-encoded data (not JSON)
  const formData = new FormData();
  formData.append('username', username);
  formData.append('password', password);

  const res = await fetch('/login', { method: 'POST', body: formData });
  const data = await res.json();

  if (data.error) {
    // Show red error message if login failed
    msg.className = 'msg error';
    msg.textContent = data.error;
  } else {
    // Show green success message then redirect to dashboard
    msg.className = 'msg success';
    msg.textContent = 'Login successful! Redirecting...';
    setTimeout(() => window.location.href = '/dashboard', 800);
  }
}

// Handle registration form submission
// Sends username, email, and password to the /register endpoint
// On success: shows confirmation and switches back to login tab after 1.5s
// On failure: shows the error (e.g. username already taken)
async function doRegister() {
  const username = document.getElementById('regUsername').value;
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  const msg = document.getElementById('regMsg');

  const formData = new FormData();
  formData.append('username', username);
  formData.append('email', email);
  formData.append('password', password);

  const res = await fetch('/register', { method: 'POST', body: formData });
  const data = await res.json();

  if (data.error) {
    msg.className = 'msg error';
    msg.textContent = data.error;
  } else {
    // Account created — show success and redirect to login tab
    msg.className = 'msg success';
    msg.textContent = data.message;
    setTimeout(() => showTab('login'), 1500);
  }
}

// Allow pressing Enter key to trigger login without clicking the button
document.addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
