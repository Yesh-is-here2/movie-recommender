<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineAI — Dashboard</title>
<!-- Orbitron: futuristic monospace display font for headings, labels, buttons -->
<!-- Rajdhani: clean sci-fi body font for readable text and inputs -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  /* ── CSS Variables ── */
  :root {
    --cyan: #00f5ff;
    --pink: #ff006e;
    --purple: #8b00ff;
    --green: #00ff88;
    --dark: #020714;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(0,245,255,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* ── Background grid ── subtle cyan grid lines for sci-fi atmosphere */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image: linear-gradient(rgba(0,245,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* ── Atmospheric orbs ── large blurred color blobs for background depth */
  .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.15; z-index: 0; pointer-events: none; }
  .orb-1 { width: 600px; height: 600px; background: var(--cyan); top: -200px; left: -200px; animation: drift 12s ease-in-out infinite; }
  .orb-2 { width: 500px; height: 500px; background: var(--pink); bottom: -150px; right: -150px; animation: drift 10s ease-in-out infinite reverse; }
  @keyframes drift { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-20px)} }

  /* ── Navigation bar ── sticky, glass background, stays visible on scroll */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(2,7,20,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }

  /* CINEAI logo with cyan/purple gradient */
  .nav-logo {
    font-family: 'Orbitron', monospace;
    font-size: 1.3rem; font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    display: flex; align-items: center; gap: 10px;
  }
  .nav-logo span { filter: none; -webkit-text-fill-color: initial; font-size: 1.4rem; }

  .nav-right { display: flex; align-items: center; gap: 16px; }

  /* Username badge — glowing cyan pill */
  .user-badge {
    padding: 6px 16px; border-radius: 20px;
    background: rgba(0,245,255,0.08);
    border: 1px solid rgba(0,245,255,0.2);
    color: var(--cyan); font-size: 0.8rem;
    letter-spacing: 2px; text-transform: uppercase;
    font-family: 'Orbitron', monospace;
  }

  /* Logout button — pink/red tone */
  .logout-btn {
    padding: 8px 18px; border-radius: 8px;
    background: rgba(255,0,110,0.1);
    border: 1px solid rgba(255,0,110,0.3);
    color: var(--pink); cursor: pointer;
    text-decoration: none; font-size: 0.75rem;
    letter-spacing: 2px; text-transform: uppercase;
    font-family: 'Orbitron', monospace;
    transition: all 0.3s;
  }
  .logout-btn:hover { background: rgba(255,0,110,0.2); box-shadow: 0 0 20px rgba(255,0,110,0.3); }

  /* Animated glow line at bottom of nav */
  nav::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    animation: navScan 4s ease-in-out infinite;
  }
  @keyframes navScan { 0%,100%{opacity:0.3} 50%{opacity:1} }

  /* ── Main content area ── */
  .main { max-width: 1300px; margin: 0 auto; padding: 32px 24px; position: relative; z-index: 1; }

  /* ── Search panel ── glassmorphism card containing search and selfie controls */
  .search-panel {
    background: var(--glass);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 32px;
    position: relative; overflow: hidden;
    animation: slideIn 0.6s ease forwards;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }

  /* Top glow line on search panel */
  .search-panel::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  }

  .search-panel-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }

  /* Section title in Orbitron font */
  .panel-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem; letter-spacing: 4px;
    color: var(--cyan); text-transform: uppercase;
  }

  /* Blinking status dot — like a live indicator */
  .panel-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 10px var(--cyan);
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Search bar row ── input + scan button + selfie button */
  .search-row { display: flex; gap: 12px; }
  .search-input-wrap { flex: 1; position: relative; }
  .search-input-wrap .s-icon {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    color: var(--cyan); opacity: 0.5; font-size: 1rem;
  }
  .search-input {
    width: 100%; padding: 14px 16px 14px 46px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(0,245,255,0.2);
    border-radius: 12px; color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem; letter-spacing: 1px; outline: none;
    transition: all 0.3s;
  }
  .search-input:focus { border-color: var(--cyan); box-shadow: 0 0 25px rgba(0,245,255,0.15); }
  .search-input::placeholder { color: rgba(255,255,255,0.2); }

  /* Scan button — cyan bordered, glows on hover */
  .btn-search {
    padding: 14px 28px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(0,245,255,0.15), rgba(139,0,255,0.15));
    border: 1px solid var(--cyan);
    color: var(--cyan); cursor: pointer;
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem; letter-spacing: 3px;
    text-transform: uppercase; white-space: nowrap;
    transition: all 0.3s;
  }
  .btn-search:hover { box-shadow: 0 0 30px rgba(0,245,255,0.4); transform: translateY(-2px); }

  /* SelfieSearch button — pink bordered */
  .btn-selfie {
    padding: 14px 22px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(255,0,110,0.15), rgba(139,0,255,0.15));
    border: 1px solid var(--pink);
    color: var(--pink); cursor: pointer;
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem; letter-spacing: 3px;
    text-transform: uppercase; white-space: nowrap;
    transition: all 0.3s;
  }
  .btn-selfie:hover { box-shadow: 0 0 30px rgba(255,0,110,0.4); transform: translateY(-2px); }

  /* ── Selfie / webcam section ──
     Hidden by default — slides in when user clicks SelfieSearch */
  .selfie-section {
    display: none; margin-top: 24px; text-align: center;
    padding: 24px; border-radius: 16px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,0,110,0.2);
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .selfie-section p { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 16px; letter-spacing: 1px; }

  /* Webcam video feed — mirrored horizontally so it feels like a mirror */
  .selfie-section video {
    border-radius: 16px;
    border: 2px solid var(--pink);
    width: 320px; max-width: 100%;
    transform: scaleX(-1);
    box-shadow: 0 0 30px rgba(255,0,110,0.3);
  }
  /* Hidden canvas used to capture a still frame from the video */
  .selfie-section canvas { display: none; }

  /* Capture button — pink theme */
  .btn-capture {
    margin-top: 16px; padding: 12px 28px;
    border-radius: 10px;
    background: rgba(255,0,110,0.15);
    border: 1px solid var(--pink);
    color: var(--pink); cursor: pointer;
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem; letter-spacing: 3px;
    transition: all 0.3s;
  }
  .btn-capture:hover { box-shadow: 0 0 20px rgba(255,0,110,0.4); }

  /* Emotion badge — shown after DeepFace analysis returns a result */
  .emotion-badge {
    display: inline-block; padding: 10px 24px;
    border-radius: 30px;
    background: linear-gradient(135deg, rgba(0,245,255,0.2), rgba(139,0,255,0.2));
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem; letter-spacing: 3px;
    box-shadow: 0 0 20px rgba(0,245,255,0.3);
    animation: badgePulse 2s ease-in-out infinite;
  }
  @keyframes badgePulse { 0%,100%{box-shadow:0 0 20px rgba(0,245,255,0.3)} 50%{box-shadow:0 0 40px rgba(0,245,255,0.6)} }

  /* ── Loading spinner ── shown while API calls are in progress */
  .loading { text-align: center; padding: 60px 0; display: none; }
  .loader {
    width: 60px; height: 60px; margin: 0 auto 20px;
    border: 2px solid rgba(0,245,255,0.1);
    border-top: 2px solid var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    box-shadow: 0 0 20px rgba(0,245,255,0.3);
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading p { color: var(--cyan); font-family: 'Orbitron', monospace; font-size: 0.7rem; letter-spacing: 4px; animation: blink 1s ease-in-out infinite; }

  /* ── Results header ── line with match count on the right */
  .results-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    font-family: 'Orbitron', monospace; font-size: 0.75rem;
    color: rgba(0,245,255,0.5); letter-spacing: 3px; text-transform: uppercase;
  }
  /* Horizontal line that fills the space between label and count */
  .results-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(0,245,255,0.3), transparent); }

  /* ── Movie cards grid ── auto-fill responsive grid */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 18px;
  }

  /* ── Individual movie card ──
     Each card animates in with staggered delay (set via animation-delay in JS) */
  .movie-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px; overflow: hidden;
    transition: all 0.4s ease;
    cursor: pointer; position: relative;
    animation: cardIn 0.5s ease forwards;
    opacity: 0;
  }
  @keyframes cardIn { to{opacity:1;transform:translateY(0)} from{opacity:0;transform:translateY(20px)} }

  /* Hover: lift up, cyan border glow, scale slightly */
  .movie-card:hover {
    border-color: var(--cyan);
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 20px 60px rgba(0,245,255,0.15), 0 0 30px rgba(0,245,255,0.1);
  }

  /* Subtle gradient overlay that appears on hover */
  .movie-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,245,255,0.05), transparent);
    opacity: 0; transition: opacity 0.3s;
  }
  .movie-card:hover::before { opacity: 1; }

  .movie-poster { width: 100%; height: 260px; object-fit: cover; }

  /* Placeholder shown when TMDB has no poster for a movie */
  .no-poster {
    width: 100%; height: 260px;
    background: linear-gradient(135deg, rgba(0,245,255,0.05), rgba(139,0,255,0.05));
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem; border-bottom: 1px solid var(--glass-border);
  }

  .movie-body { padding: 14px; }
  .movie-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }

  /* Match percentage in Orbitron for that data-readout feel */
  .movie-score {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem; color: var(--cyan);
    letter-spacing: 2px; margin-bottom: 10px;
  }

  /* Cast and Similar action buttons on each card */
  .card-actions { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag-btn {
    padding: 4px 10px; border-radius: 20px;
    font-size: 0.65rem; cursor: pointer;
    background: transparent; transition: all 0.2s;
    font-family: 'Orbitron', monospace; letter-spacing: 1px;
  }
  .tag-btn.cast { border: 1px solid rgba(0,245,255,0.4); color: var(--cyan); }
  .tag-btn.cast:hover { background: rgba(0,245,255,0.15); box-shadow: 0 0 10px rgba(0,245,255,0.3); }
  .tag-btn.similar { border: 1px solid rgba(255,0,110,0.4); color: var(--pink); }
  .tag-btn.similar:hover { background: rgba(255,0,110,0.15); box-shadow: 0 0 10px rgba(255,0,110,0.3); }

  /* ── Modal overlay ──
     Full-screen dark backdrop that appears when Cast/Similar/Actor is clicked */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }

  /* Modal panel — dark glass with cyan top border */
  .modal {
    background: rgba(2,7,20,0.95);
    border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 32px;
    max-width: 640px; width: 92%;
    max-height: 82vh; overflow-y: auto;
    position: relative;
    box-shadow: 0 0 60px rgba(0,245,255,0.1);
    animation: modalIn 0.3s ease;
  }
  @keyframes modalIn { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
  .modal::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  }

  /* Close button — pink X in top right */
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: rgba(255,0,110,0.1); border: 1px solid rgba(255,0,110,0.3);
    border-radius: 8px; color: var(--pink); cursor: pointer;
    width: 32px; height: 32px; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
  }
  .modal-close:hover { background: rgba(255,0,110,0.25); }

  /* Modal title in Orbitron */
  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem; letter-spacing: 3px;
    color: var(--cyan); margin-bottom: 24px;
    padding-right: 40px;
  }

  /* ── Cast grid ── circular actor photos in a responsive grid */
  .cast-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 16px; }
  .cast-card {
    text-align: center; cursor: pointer; padding: 12px 8px;
    border-radius: 12px; transition: all 0.3s;
    border: 1px solid transparent;
  }
  .cast-card:hover { background: rgba(0,245,255,0.05); border-color: rgba(0,245,255,0.2); }
  .cast-card img {
    width: 72px; height: 72px; border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(0,245,255,0.3);
    box-shadow: 0 0 15px rgba(0,245,255,0.15);
  }
  .cast-card .no-photo {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(0,245,255,0.05);
    border: 2px solid rgba(0,245,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; margin: 0 auto;
  }
  .cast-card p { font-size: 0.75rem; margin-top: 8px; color: #ddd; }
  .cast-card span { font-size: 0.65rem; color: rgba(0,245,255,0.5); }

  /* ── Similar movies grid ── poster thumbnails */
  .similar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
  .similar-card img { width: 100%; height: 170px; object-fit: cover; border-radius: 10px; border: 1px solid var(--glass-border); }
  .similar-card p { font-size: 0.75rem; margin-top: 6px; color: #ccc; text-align: center; }

  /* Custom cyan scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
  ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 2px; }
</style>
</head>
<body>

<!-- Animated background grid -->
<div class="bg-grid"></div>
<!-- Atmospheric glowing orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- Sticky navigation bar -->
<nav>
  <div class="nav-logo"><span>🎬</span> CINEAI</div>
  <div class="nav-right">
    <!-- user.username injected by Jinja2 from the server -->
    <div class="user-badge">⚡ {{ user.username }}</div>
    <a href="/logout" class="logout-btn">◀ Exit</a>
  </div>
</nav>

<div class="main">

  <!-- Search panel with blinking status indicator -->
  <div class="search-panel">
    <div class="search-panel-header">
      <div class="panel-dot"></div>
      <div class="panel-title">Movie Intelligence Search</div>
    </div>

    <!-- Search bar row: text input + Scan button + SelfieSearch button -->
    <div class="search-row">
      <div class="search-input-wrap">
        <span class="s-icon">🔍</span>
        <input type="text" class="search-input" id="movieInput" placeholder="Enter a movie you like (e.g. Inception, Interstellar...)">
      </div>
      <button class="btn-search" onclick="searchMovies()">▶ Scan</button>
      <button class="btn-selfie" onclick="toggleSelfie()">◈ Selfie Scan</button>
    </div>

    <!-- Selfie/webcam section — hidden until SelfieSearch is clicked -->
    <div class="selfie-section" id="selfieSection">
      <p>◈ Point camera at face — AI will detect your mood and recommend matching movies</p>
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas> <!-- Hidden canvas for frame capture -->
      <br>
      <button class="btn-capture" onclick="captureAndAnalyze()">▶ Capture & Analyze</button>
      <div class="emotion-result" id="emotionResult"></div>
    </div>
  </div>

  <!-- Loading spinner — shown while waiting for API response -->
  <div class="loading" id="loading">
    <div class="loader"></div>
    <p>Scanning Cinema Database...</p>
  </div>

  <!-- Results section — hidden until recommendations are ready -->
  <div id="resultsSection" style="display:none">
    <div class="results-header">
      <span>Results</span>
      <div class="results-line"></div>
      <span id="resultsCount">0 matches</span>
    </div>
    <div class="results-grid" id="resultsGrid"></div>
  </div>
</div>

<!-- Modal overlay — used for Cast, Similar, and Actor detail popups -->
<!-- Clicking outside the modal box closes it -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<script>
let stream = null;

// Store movies globally so Cast/Similar buttons can access by index
// Avoids passing large JSON objects through onclick attributes
window._movies = [];

// Search for movie recommendations based on typed title
// Posts to /recommend endpoint and renders results
async function searchMovies() {
  const title = document.getElementById('movieInput').value.trim();
  if (!title) return;
  showLoading(true);
  try {
    const res = await fetch('/recommend', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({title, top_n: 10})
    });
    const data = await res.json();
    showLoading(false);
    renderMovies(data.recommendations || []);
  } catch(err) { showLoading(false); }
}

// Toggle webcam section on/off
// First click: shows section and starts camera stream
// Second click: hides section and stops camera to release it
async function toggleSelfie() {
  const section = document.getElementById('selfieSection');
  if (section.style.display === 'block') {
    section.style.display = 'none';
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    return;
  }
  section.style.display = 'block';
  try {
    stream = await navigator.mediaDevices.getUserMedia({video: {width:640, height:480}});
    document.getElementById('video').srcObject = stream;
  } catch(err) { alert('Camera access required for Selfie Scan.'); }
}

// Capture a frame from the webcam and send to /selfie-search for emotion analysis
// Mirror-flips the canvas to match what the user sees in the video feed
async function captureAndAnalyze() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width = 640; canvas.height = 480;
  const ctx = canvas.getContext('2d');

  // Mirror flip: scale(-1,1) and draw at negative x offset
  ctx.save(); ctx.scale(-1,1); ctx.drawImage(video, -640, 0, 640, 480); ctx.restore();

  // High quality JPEG at 95% quality
  const imageBase64 = canvas.toDataURL('image/jpeg', 0.95);

  document.getElementById('emotionResult').innerHTML = '<p style="color:rgba(0,245,255,0.6);font-size:0.8rem;letter-spacing:2px;margin-top:12px;">◈ Analyzing neural patterns...</p>';
  showLoading(true);

  try {
    const res = await fetch('/selfie-search', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({image: imageBase64})
    });
    const data = await res.json();
    showLoading(false);

    // Map each emotion to a matching emoji for the badge
    const emojis = {happy:'😄',sad:'😢',angry:'😠',fear:'😨',surprise:'😲',disgust:'🤢',neutral:'😐'};
    document.getElementById('emotionResult').innerHTML = `
      <div style="margin-top:16px;">
        <div class="emotion-badge">${emojis[data.emotion]||'🎭'} Detected: ${data.emotion.toUpperCase()}</div>
        <p style="color:rgba(255,255,255,0.5);margin-top:10px;font-size:0.85rem;">${data.message}</p>
      </div>`;

    renderMovies(data.recommendations || []);
  } catch(err) { showLoading(false); }
}

// Render movie cards into the results grid
// Uses animation-delay based on index for staggered card entrance
function renderMovies(movies) {
  window._movies = movies; // Store globally for button handlers
  const grid = document.getElementById('resultsGrid');
  const section = document.getElementById('resultsSection');
  document.getElementById('resultsCount').textContent = `${movies.length} matches`;

  if (!movies.length) {
    grid.innerHTML = '<p style="color:rgba(0,245,255,0.4);grid-column:1/-1;text-align:center;font-family:Orbitron,monospace;font-size:0.7rem;letter-spacing:3px;">No matches found in database</p>';
    section.style.display = 'block'; return;
  }

  grid.innerHTML = movies.map((m, i) => `
    <div class="movie-card" style="animation-delay:${i*0.06}s">
      ${m.poster ? `<img class="movie-poster" src="${m.poster}" alt="${m.title}" loading="lazy">` : `<div class="no-poster">🎬</div>`}
      <div class="movie-body">
        <div class="movie-title">${m.title}</div>
        <div class="movie-score">◈ MATCH ${(m.score*100).toFixed(1)}%</div>
        <div class="card-actions">
          ${m.cast&&m.cast.length?`<button class="tag-btn cast" onclick="showCast(${i})">▶ Cast</button>`:''}
          ${m.similar&&m.similar.length?`<button class="tag-btn similar" onclick="showSimilar(${i})">◈ Similar</button>`:''}
        </div>
      </div>
    </div>`).join('');

  section.style.display = 'block';
}

// Show the Cast modal for a movie
// Displays actor photos with names and characters
// Clicking an actor opens their detail page
function showCast(i) {
  const m = window._movies[i]; if(!m) return;
  document.getElementById('modalTitle').textContent = `▶ CAST — ${m.title.toUpperCase()}`;
  document.getElementById('modalContent').innerHTML = `
    <div class="cast-grid">
      ${m.cast.map(c=>`
        <div class="cast-card" onclick="showActorDetails(${c.id},'${c.name.replace(/'/g,"\\'")}')">
          ${c.photo?`<img src="${c.photo}" alt="${c.name}">`:`<div class="no-photo">👤</div>`}
          <p>${c.name}</p><span>${c.character}</span>
        </div>`).join('')}
    </div>`;
  document.getElementById('modalOverlay').classList.add('active');
}

// Show the Similar Movies modal
// Displays poster thumbnails for movies TMDB considers similar
function showSimilar(i) {
  const m = window._movies[i]; if(!m) return;
  document.getElementById('modalTitle').textContent = `◈ SIMILAR TO ${m.title.toUpperCase()}`;
  document.getElementById('modalContent').innerHTML = `
    <div class="similar-grid">
      ${m.similar.map(s=>`
        <div class="similar-card">
          ${s.poster?`<img src="${s.poster}" alt="${s.title}">`:`<div style="height:170px;background:rgba(0,245,255,0.05);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2rem;">🎬</div>`}
          <p>${s.title}</p>
        </div>`).join('')}
    </div>`;
  document.getElementById('modalOverlay').classList.add('active');
}

// Fetch and display actor biography and upcoming movies from TMDB
// Called when user clicks an actor photo in the Cast modal
async function showActorDetails(actorId, name) {
  document.getElementById('modalTitle').textContent = `◈ ${name.toUpperCase()}`;
  document.getElementById('modalContent').innerHTML = '<p style="color:rgba(0,245,255,0.5);font-family:Orbitron,monospace;font-size:0.7rem;letter-spacing:3px;">Loading profile...</p>';
  document.getElementById('modalOverlay').classList.add('active');

  try {
    const res = await fetch(`/actor/${actorId}`);
    const data = await res.json();
    document.getElementById('modalContent').innerHTML = `
      <div style="display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap;align-items:flex-start;">
        ${data.photo?`<img src="${data.photo}" style="width:90px;height:90px;border-radius:50%;object-fit:cover;border:2px solid rgba(0,245,255,0.4);box-shadow:0 0 20px rgba(0,245,255,0.2);">`:''}
        <p style="color:rgba(255,255,255,0.7);font-size:0.85rem;line-height:1.7;flex:1;">${data.bio||'No biography available.'}</p>
      </div>
      ${data.upcoming&&data.upcoming.length?`
        <div style="font-family:Orbitron,monospace;font-size:0.7rem;letter-spacing:3px;color:var(--cyan);margin-bottom:16px;">▶ Upcoming Projects</div>
        <div class="similar-grid">
          ${data.upcoming.map(m=>`
            <div class="similar-card">
              ${m.poster?`<img src="${m.poster}" alt="${m.title}">`:`<div style="height:170px;background:rgba(0,245,255,0.05);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2rem;">🎬</div>`}
              <p>${m.title}</p>
              <p style="font-size:0.65rem;color:rgba(0,245,255,0.5);text-align:center;">${m.release_date}</p>
            </div>`).join('')}
        </div>`:'<p style="color:rgba(255,255,255,0.3);font-size:0.8rem;">No upcoming projects found.</p>'}`;
  } catch(e) { document.getElementById('modalContent').innerHTML = '<p style="color:var(--pink);">Failed to load profile.</p>'; }
}

// Show or hide loading spinner
// Clears results section when loading starts
function showLoading(show) {
  document.getElementById('loading').style.display = show ? 'block' : 'none';
  if(show) { document.getElementById('resultsSection').style.display = 'none'; }
}

// Close modal when clicking the dark overlay background
function closeModal(e) { if(e.target===document.getElementById('modalOverlay')) closeModalDirect(); }

// Close modal when clicking the X button
function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('active'); }

// Allow pressing Enter in search box to trigger search
document.getElementById('movieInput').addEventListener('keypress', e => { if(e.key==='Enter') searchMovies(); });
</script>
</body>
</html>
