<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CineAI — Owner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d1a; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
  nav { background: rgba(255,255,255,0.05); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
  nav h1 { font-size: 1.4rem; color: gold; }
  .logout-btn { padding: 8px 16px; background: rgba(255,50,50,0.2); border: 1px solid rgba(255,50,50,0.3); border-radius: 8px; color: #ff6b6b; cursor: pointer; text-decoration: none; font-size: 0.85rem; }
  .main { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 32px; }
  .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 24px; text-align: center; }
  .stat-card .num { font-size: 2.5rem; font-weight: 700; color: gold; }
  .stat-card .label { color: #aaa; font-size: 0.85rem; margin-top: 6px; }
  .section { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
  .section h2 { font-size: 1.1rem; color: gold; margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 14px; color: #aaa; font-size: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
  td { padding: 10px 14px; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .badge.user { background: rgba(79,172,254,0.2); color: #4facfe; }
  .badge.admin { background: rgba(249,83,198,0.2); color: #f953c6; }
  .badge.owner { background: rgba(255,215,0,0.2); color: gold; }
</style>
</head>
<body>
<nav>
  <h1>👑 Owner Dashboard</h1>
  <div style="display:flex;align-items:center;gap:16px;">
    <span style="color:#aaa;">👤 {{ user.username }}</span>
    <a href="/logout" class="logout-btn">Logout</a>
  </div>
</nav>

<div class="main">
  <div class="stats">
    <div class="stat-card"><div class="num" id="totalUsers">—</div><div class="label">Users</div></div>
    <div class="stat-card"><div class="num" id="totalAdmins">—</div><div class="label">Admins</div></div>
    <div class="stat-card"><div class="num" id="totalSearches">—</div><div class="label">Searches</div></div>
    <div class="stat-card"><div class="num" id="totalSelfie">—</div><div class="label">Selfie Searches</div></div>
  </div>

  <div class="section">
    <h2>📋 Full System Activity (Last 100)</h2>
    <table>
      <thead><tr><th>User</th><th>Action</th><th>Details</th><th>Time</th></tr></thead>
      <tbody id="activityTable"></tbody>
    </table>
  </div>
</div>

<script>
async function loadData() {
  const res = await fetch('/owner/stats');
  const data = await res.json();

  document.getElementById('totalUsers').textContent = data.total_users;
  document.getElementById('totalAdmins').textContent = data.total_admins;
  document.getElementById('totalSearches').textContent = data.total_searches;
  document.getElementById('totalSelfie').textContent = data.total_selfie_searches;

  document.getElementById('activityTable').innerHTML = data.recent_activity.map(a => `
    <tr>
      <td>${a.username}</td>
      <td>${a.action}</td>
      <td>${a.details}</td>
      <td>${a.timestamp}</td>
    </tr>
  `).join('');
}
loadData();
</script>
</body>
</html>
